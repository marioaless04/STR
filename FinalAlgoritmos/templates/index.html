<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container">
    <h1 class="heading">Ingrese las inversiones mensuales (en millones de dólares)</h1>
    <form action="/result" method="post">
        {% for month_info in [('Enero', 1), ('Febrero', 2), ('Marzo', 3)] %}
            <h2>{{ month_info[0] }}</h2>
            {% for i in range(1, 7) %}
                <label for="investment{{ month_info[1] }}{{ i }}">Inversión {{ i }} de {{ month_info[0] }}:</label>
                <input type="number" id="investment{{ month_info[1] }}{{ i }}" name="investment" class="input-field" value="{{ initial_value }}" min="0"><br>
            {% endfor %}
        {% endfor %}
        <input type="submit" value="Submit" class="submit-btn">
    </form>
</body>
</html>
